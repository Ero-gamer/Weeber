name: Clean

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Allows the action to push changes back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          # Fetch full history so we can push back
          fetch-depth: 0 

      - name: Delete Language Folders
        run: |
          TARGET_DIR="app/src/main/res"
          
          # Delete all 'values-*' folders (this keeps the base 'values' folder)
          # The -v flag in rm will print exactly what is being deleted in your logs
          rm -rfv $TARGET_DIR/values-*/
          
          # Check if there are actually changes to commit
          if [ -z "$(git status --porcelain)" ]; then
            echo "No folders found to delete. Repository is already clean."
            exit 0
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "Automation: Permanently removed localized resource folders"
          git push origin ${{ github.ref_name }}
